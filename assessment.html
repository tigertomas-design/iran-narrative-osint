<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שולחן הערכת מצב</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
  --border: #21262d; --border2: #30363d;
  --text: #e6edf3; --muted: #7d8590; --muted2: #484f58;
  --iran: #f85149; --trump: #e3b341; --russia: #c9d1d9;
  --china: #e85d04; --netanyahu: #58a6ff; --pool: #58a6ff;
  --analyst: #bc8cff;
  --green: #3fb950; --purple: #bc8cff;
}
html, body { background: var(--bg); color: var(--text);
  font-family: 'Heebo', sans-serif; font-weight: 300; height: 100vh; overflow: hidden; }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,17,23,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; gap: 12px; padding: 0 20px; height: 52px;
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }
.topbar-sub   { font-size: 13px; color: var(--muted); }
.btn { display: inline-flex; align-items: center; gap: 6px; border-radius: 6px;
  padding: 5px 12px; font-family: 'Heebo'; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: opacity .15s; text-decoration: none; }
.btn:hover { opacity: .8; }
.btn-back { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border2); }
.btn-key  { background: rgba(88,166,255,.1); color: var(--pool); border: 1px solid rgba(88,166,255,.3); margin-right: auto; }
.topbar-sep { flex: 1; }

/* ── LAYOUT ── */
.layout {
  display: grid; grid-template-columns: 280px 1fr;
  height: calc(100vh - 52px); margin-top: 52px; overflow: hidden;
}

/* ── ACTOR SIDEBAR ── */
.sidebar {
  background: var(--surface); border-left: 1px solid var(--border2);
  overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px;
}
.sidebar-title { font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .8px; padding: 4px 8px 10px; }

.actor-card {
  border-radius: 10px; padding: 14px 16px; cursor: pointer;
  border: 1px solid var(--border2); background: transparent;
  transition: all .15s; text-align: right;
}
.actor-card:hover   { background: var(--surface2); border-color: var(--actor-color); }
.actor-card.active  { background: rgba(0,0,0,.3); border-color: var(--actor-color);
  box-shadow: 0 0 0 1px var(--actor-color); }
.actor-flag  { font-size: 22px; margin-bottom: 6px; }
.actor-name  { font-size: 16px; font-weight: 700; }
.actor-role  { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.actor-stats { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.stat-pill   { font-size: 11px; padding: 2px 7px; border-radius: 10px;
  background: rgba(255,255,255,.06); color: var(--muted); }

/* ── CHAT AREA ── */
.chat-area { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

/* ── ACTOR HEADER ── */
.actor-header {
  padding: 18px 24px 14px; border-bottom: 1px solid var(--border2);
  background: var(--surface); flex-shrink: 0;
  display: flex; align-items: flex-start; gap: 16px;
}
.actor-header-flag { font-size: 36px; line-height: 1; }
.actor-header-info { flex: 1; }
.actor-header-name { font-size: 22px; font-weight: 900; }
.actor-header-desc { font-size: 14px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.actor-header-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.header-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: rgba(255,255,255,.07); color: var(--muted); border: 1px solid var(--border2); }

/* ── MESSAGES ── */
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.msg { display: flex; gap: 12px; align-items: flex-start; max-width: 820px; }
.msg.user { flex-direction: row-reverse; margin-right: 0; margin-left: auto; }
.msg.user .bubble { background: rgba(88,166,255,.12); border: 1px solid rgba(88,166,255,.25);
  border-radius: 14px 4px 14px 14px; }
.msg.actor .bubble { background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 4px 14px 14px 14px; }
.bubble { padding: 14px 18px; font-size: 16px; line-height: 1.75; max-width: 700px; }
.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { color: var(--text); font-weight: 700; }
.bubble em { color: var(--muted); font-style: normal; font-size: 14px; }
.avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  background: var(--surface2); border: 1px solid var(--border2); }
.avatar.user-av { background: rgba(88,166,255,.15); border-color: rgba(88,166,255,.3); font-size: 14px; }

.typing { display: flex; gap: 5px; align-items: center; padding: 12px 18px; }
.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  animation: bounce .9s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── SUGGESTED QUESTIONS ── */
.suggestions { padding: 10px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.sugg-btn { font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer;
  background: rgba(255,255,255,.04); border: 1px solid var(--border2);
  color: var(--muted); font-family: 'Heebo'; transition: all .15s; }
.sugg-btn:hover { background: rgba(255,255,255,.08); color: var(--text); border-color: var(--border2); }

/* ── INPUT ── */
.input-area { padding: 14px 24px 18px; border-top: 1px solid var(--border2); flex-shrink: 0; }
.input-row { display: flex; gap: 10px; align-items: flex-end; }
textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 16px; color: var(--text);
  font-family: 'Heebo'; font-size: 16px; font-weight: 300; resize: none;
  min-height: 48px; max-height: 140px; outline: none; direction: rtl; line-height: 1.5;
}
textarea:focus { border-color: var(--pool); }
textarea::placeholder { color: var(--muted2); }
.send-btn { width: 46px; height: 46px; border-radius: 10px; border: none; cursor: pointer;
  background: var(--pool); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s; }
.send-btn:hover { opacity: .8; }
.send-btn:disabled { opacity: .3; cursor: default; }

/* ── API KEY MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; }
.modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
  padding: 32px; max-width: 440px; width: 90%; }
.modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.modal p  { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
.modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Heebo';
  font-size: 14px; outline: none; margin-bottom: 12px; direction: ltr; }
.modal input:focus { border-color: var(--pool); }
.btn-primary { background: var(--pool); color: white; width: 100%; padding: 10px;
  border-radius: 8px; font-size: 15px; font-weight: 700; justify-content: center; }

/* ── ANALYST SPECIAL CARD ── */
.analyst-card { background: rgba(188,140,255,.04); }
.analyst-card:hover { background: rgba(188,140,255,.10) !important; }
.analyst-card.active { background: rgba(188,140,255,.12) !important; }

/* ── EMPTY STATE ── */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; color: var(--muted); text-align: center; padding: 40px; }
.empty-state .big { font-size: 48px; margin-bottom: 8px; }
.empty-state h2 { font-size: 22px; font-weight: 700; color: var(--text); }
.empty-state p  { font-size: 15px; max-width: 380px; line-height: 1.6; }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>

<div class="layout">

<script>
// ── ACTOR DEFINITIONS ─────────────────────────────────────────────────────────
const ACTORS = [
  {
    id: "iran-leadership",
    flag: "🇮🇷",
    name: "מנהיגות איראן",
    color: "#f85149",
    role: "המועצה העליונה, ח׳מנאי, פזשכיאן, ערגצ׳י",
    stats: ["שיעה-שמרנית", "הצלחת הגרעין", "ציר ההתנגדות"],
    tags: ["ולאית אלפקיה", "מדיניות עמידה", "מעצמה אזורית", "IRGC"],
    suggestions: [
      "מה הטריגר שיוביל לסגירת מיצר הורמוז?",
      "כיצד המשטר מנהל את הסתירה בין הגרעין לרווחה הכלכלית?",
      "מה הפחד הקיומי הגדול ביותר של ההנהגה כיום?"
    ],
    systemPrompt: `אתה מגלם את המנהיגות האיראנית — שילוב של עמדות הח׳מנאי, פזשכיאן וערגצ׳י. תפקידך לספק ניתוח עמוק ואמין של תפיסת העולם, האינטרסים, החישובים ואופן קבלת ההחלטות של הממשל האיראני.

═══ אידיאולוגיה ובסיס לגיטימציה ═══
• ולאית אלפקיה (ولاية الفقيه): שלטון הפקיה הדתי הוא עיקרון חוקתי ומוחלט — הרה׳בר הוא הסמכות העליונה מעל נשיא, פרלמנט ושופטים
• ציר ההתנגדות (محور المقاومة): איראן כמנהיגה רוחנית ואסטרטגית של קואליציה שיעית-אנטי-מערבית — חיזבאללה, חמאס (שותפות טקטית), חות׳ים, PKF עיראקי
• האידיאולוגיה הח׳מינייסטית: שילוב ייחודי של לאומיות פרסית (גאווה 2,500 שנה), שיעה דתית פוליטית, ואנטי-אימפריאליזם של העולם השלישי
• "שטן גדול" (ארה"ב) ו"ישות ציונית" (ישראל) — לא רק אויבים, אלא מייצגים עיוות מוסרי-ציווילי שחייב להיות מאוזן

═══ לחצים פנימיים ומתחים מבניים ═══
• כלכלה: אינפלציה 40-50%, ריאל איראני קרס, אבטלת נוער 25%+, מוח בריחה של 150,000+ מקצועיים/שנה
• פער דורי קריטי: 60% מהאוכלוסייה מתחת לגיל 35, זיקה חלשה לאידיאולוגיה המהפכנית, מחאות 2019/2022 שוב לא נשכחות
• שסע בין IRGC (מנגנון הכוח, הכלכלה, הדוגמטיזם) לממשלת פזשכיאן (פרגמטי, מוכן לדיאלוג, לחץ פוסט-ח׳מנאי)
• ח׳מנאי: העברת כוח ושאלת הממשיך — אחמד ח׳מנאי כמועמד? מהי הלגיטימציה הבאה?

═══ חישובי קבלת החלטות ═══
• עלות/תועלת גיאו-אסטרטגית קרה, לא אמוציונלית: "מה מחזק את הישרדות המשטר?"
• הגרעין כביטוח קיומי — לא נשק ראשון בהכרח, אלא ערבות לאי-חזרה של "תרחיש לובי/עיראק"
• מיצר הורמוז: נשק גרעיני כלכלי — אסור להשתמש בו ראשון (משמידה את הנפט שלנו), אבל האיום שמר על עצמו
• חשש מ"מלכוד תלות": הסכמים עם ארה"ב עלולים לפתוח ביקורת פנימית, להחליש את IRGC, ולערער את הלגיטימציה הדתית
• "ניצחון אסטרטגי" = הישרדות + השפעה אזורית, לא ניצחון צבאי מוחלט

═══ מבנה כוח פנימי ═══
• IRGC: שולט בין 20-40% מהכלכלה, מוסד עצמאי מעשית, אינטרס בהמשך סנקציות (מהן מרוויח בשוק שחור)
• בסיג׳: כוח פרה-מיליטרי לשליטה פנימית
• מועצת שמירת החוקה: וטו על כל מועמד/חוק שאינו "איסלאמי מספיק"
• פזשכיאן: מוגבל יותר מכל נשיא קודם — IRGC הוא שחקן מחסום

═══ נרטיבים וסגנון תקשורת ═══
• בפומבי: פאתוס דתי-לאומי, קריאה לרב-קוטביות, "כל הסנקציות לא שברו אותנו"
• בפנים: פרגמטיזם זהיר, מוכן לפשרות שלא ייקראו "כניעה"
• לעולם לא מודה בחולשה ישירות — כל נסיגה מנוסחת כ"חוכמה אסטרטגית" או "גמישות הרואית"
• שפות הנרטיב: ערבית (לציר), פרסית (לפנים), אנגלית (PressTV/IrnaEnglish), עברית (לישראל)

כשתענה: תמיד מנקודת המבט הפנימית האיראנית. השתמש בנתוני הפוסטים שסופקו. ענה בעברית בפירוט, עומק ומורכבות.`
  },
  {
    id: "trump",
    flag: "🇺🇸",
    name: "דונלד טראמפ",
    color: "#e3b341",
    role: "נשיא ארה״ב, Truth Social, @realDonaldTrump",
    stats: ["עסקות, לא מלחמות", "לחץ מקסימלי", "America First"],
    tags: ["ניו-מרקנטיליזם", "תקשורת אגרסיבית", "קו אדום נזיל", "populism"],
    suggestions: [
      "מתי תסכים לעסקה עם איראן ומה הכרטיסים שלה?",
      "מה הקו האדום שיוביל להתקפה צבאית ישירה?",
      "איך אתה מאזן בין תמיכה בנתניהו לאינטרסים הכלכליים שלך?"
    ],
    systemPrompt: `אתה מגלם את דונלד טראמפ, נשיא ארה"ב ה-47 (ינואר 2025–), כפי שמשתקף מציוצי Truth Social, ראיונות ומדיניות מוצהרת.

═══ פסיכולוגיה ומנגנוני חשיבה ═══
• הכל הוא עסקה: כל מצב גיאופוליטי מתורגם ל"מה אני מרוויח?" — כסף, מחיר נפט נמוך, ניצחון PR, הכנסות בורסה
• Transactional, לא אידיאולוגי: בניגוד לניאו-שמרנים, לא מאמין ב"nation building" או "democracy promotion"
• לחץ מקסימלי = כלי ראשון: סנקציות, איומים, כוח — כדי לייצר פחד ואז להגיע לשולחן בתנאים שלו
• ניצחון = תמונה, לא מצב: הסכם חתום עם צילומים > שינוי עמוק שאף אחד לא יראה
• בורסה = מד-לחץ פנימי: אם הבורסה יורדת מהמתיחות, הוא ינסוג. אם עולה — ייאתגר

═══ על איראן (2025-2026) ═══
• "Maximum Pressure 2.0": הגבר סנקציות, אפס יצוא נפט, הבא אותם לברכיים
• מאמין שאיראן בסוף "תתקפל" כמו צפון קוריאה — אבל מתוסכל שזה לוקח זמן
• מעדיף עסקה גדולה (גרעין + גישה לשווקים + שחרור שבויים) על מלחמה שתעלה מחיר נפט
• ישראל: תמיכה רעשנית בפומבי, אך אם נתניהו "מסבך" עם מלחמה שתכאב לכיסו — לחץ ישיר מאחורי הקלעים
• מחיר הדלק: אם מלחמה תעלה ליטר/גלון — זה קו אדום פוליטי אמיתי

═══ דינמיקה פנימית ═══

  if (!getApiKey()) setTimeout(showKeyModal, 500);
}

function getApiKey() { return localStorage.getItem('anthropic_key') || ''; }
function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k.startsWith('sk-ant')) { alert('מפתח לא תקין'); return; }
  localStorage.setItem('anthropic_key', k);
  document.getElementById('key-modal').style.display = 'none';
}
function showKeyModal() {
  document.getElementById('key-modal').style.display = 'flex';
  document.getElementById('api-key-input').value = getApiKey();
}

// ── Load pool data for persona grounding ─────────────────────────────────────
function loadPoolData() {
  Promise.all([
    fetch('iran_posts.json?t='     + Date.now()).then(r => r.ok ? r.json() : {posts:[]}),
    fetch('trump_posts.json?t='    + Date.now()).then(r => r.ok ? r.json() : {posts:[]}),
    fetch('telegram_posts.json?t=' + Date.now()).then(r => r.ok ? r.json() : {posts:[]}).catch(() => ({posts:[]}))
  ]).then(([iD, tD, tgD]) => {
    poolData.iran     = (iD.posts  || []).slice(0, 60);
    poolData.trump    = (tD.posts  || []).slice(0, 30);
    poolData.telegram = (tgD.posts || []).slice(0, 30);
  }).catch(() => {});
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.querySelector('.sidebar');
  sb.innerHTML = '<div class="sidebar-title">שחקנים</div>';
  ACTORS.forEach(a => {
    // Add separator before the analyst
    if (a.id === 'analyst') {
      const sep = document.createElement('div');
      sep.style.cssText = 'border-top:1px solid var(--border2);margin:6px 0 2px;padding-top:10px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding-right:8px;';
      sep.textContent = 'ניתוח עצמאי';
      sb.appendChild(sep);
    }
    const card = document.createElement('div');
    card.className = 'actor-card' + (a.id === 'analyst' ? ' analyst-card' : '');
    card.style.setProperty('--actor-color', a.color);
    card.innerHTML = `
      <div class="actor-flag">${a.flag}</div>
      <div class="actor-name" style="color:${a.color}">${a.name}</div>
      <div class="actor-role">${a.role}</div>
      <div class="actor-stats">${a.stats.map(s=>`<span class="stat-pill">${s}</span>`).join('')}</div>
    `;
    card.onclick = () => selectActor(a);
    sb.appendChild(card);
  });
}

// ── Select actor ──────────────────────────────────────────────────────────────
function selectActor(actor) {
  currentActor = actor;
  chatHistory[actor.id] = chatHistory[actor.id] || [];

  document.querySelectorAll('.actor-card').forEach(c => c.classList.remove('active'));
  event?.currentTarget?.classList.add('active');
  // Re-find by actor id
  document.querySelectorAll('.actor-card').forEach((c,i) => {
    if (ACTORS[i]?.id === actor.id) c.classList.add('active');
  });

  renderChatArea(actor);
}

function renderChatArea(actor) {
  const area = document.getElementById('chat-area');
  area.innerHTML = `
    <div class="actor-header">
      <div class="actor-header-flag">${actor.flag}</div>
      <div class="actor-header-info">
        <div class="actor-header-name" style="color:${actor.color}">${actor.name}</div>
        <div class="actor-header-desc">${actor.role}</div>
        <div class="actor-header-tags">${actor.tags.map(t=>`<span class="header-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="suggestions" id="suggestions"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="שאלי שאלה..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  `;
  renderSuggestions(actor);
  renderMessages();
  document.getElementById('user-input').focus();
}

function renderSuggestions(actor) {
  const s = document.getElementById('suggestions');
  if (!s) return;
  s.innerHTML = actor.suggestions.map(q =>
    `<button class="sugg-btn" onclick="useSuggestion(this)">${q}</button>`
  ).join('');
}

function useSuggestion(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage();
}

// ── Messages ──────────────────────────────────────────────────────────────────
function renderMessages() {
  const msgs = document.getElementById('messages');
  if (!msgs) return;
  const history = chatHistory[currentActor?.id] || [];
  msgs.innerHTML = history.map(m => msgHTML(m.role, m.content)).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function msgHTML(role, content) {
  const isUser = role === 'user';
  const avatar = isUser ? '👤' : currentActor?.flag || '🤖';
  const text = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  return `<div class="msg ${isUser?'user':'actor'}">
    <div class="avatar ${isUser?'user-av':''}">${avatar}</div>
    <div class="bubble"><p>${text}</p></div>
  </div>`;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  if (!msgs) return;
  const div = document.createElement('div');
  div.className = 'msg actor'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar">${currentActor?.flag||'🤖'}</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

// ── Send message ──────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function sendMessage() {
  if (isStreaming || !currentActor) return;
  const input = document.getElementById('user-input');
  const text  = (input.value || '').trim();
  if (!text) return;

  const key = getApiKey();
  if (!key) { showKeyModal(); return; }

  input.value = ''; autoResize(input);
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').style.display = 'none';

  chatHistory[currentActor.id].push({ role: 'user', content: text });
  renderMessages();
  addTyping();
  isStreaming = true;

  // Build system prompt with pool context
  const poolContext = buildPoolContext();
  const system = currentActor.systemPrompt + poolContext;

  const messages = chatHistory[currentActor.id].map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.content
  }));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: currentActor.id === 'analyst' ? 2048 : 1200,
        system,
        messages,
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content?.[0]?.text || '(אין תשובה)';
    removeTyping();
    chatHistory[currentActor.id].push({ role: 'assistant', content: reply });
    renderMessages();

  } catch(e) {
    removeTyping();
    chatHistory[currentActor.id].push({ role: 'assistant',
      content: `❌ שגיאה: ${e.message}. בדקי את מפתח ה-API.` });
    renderMessages();
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('suggestions').style.display = 'flex';
  input.focus();
}

// ── Pool context for system prompt ────────────────────────────────────────────
function buildPoolContext() {
  let ctx = '\n\n---\nנתוני אמת מהבריכה (60 ימים אחרונים):\n';
  let hasData = false;

  const addIranPosts = (limit) => {
    if (!poolData.iran.length) return;
    const recent = poolData.iran.slice(0, limit);
    ctx += `\nפוסטים איראניים אחרונים ב-X (${poolData.iran.length} סה"כ):\n`;
    recent.forEach(p => {
      ctx += `• ${p.account} (${p.date?.slice(0,10)}): "${(p.text||'').slice(0,140)}"`;
      if (p.narratives?.length) ctx += ` [נרטיב: ${p.narratives.join(', ')}]`;
      if (p.aggression) ctx += ` [תוקפנות: ${p.aggression}/5]`;
      ctx += '\n';
    });
    hasData = true;
  };

  const addTrumpPosts = (limit) => {
    if (!poolData.trump.length) return;
    const recent = poolData.trump.slice(0, limit);
    ctx += `\nציוצי טראמפ אחרונים (${poolData.trump.length} סה"כ):\n`;
    recent.forEach(p => {
      ctx += `• ${p.date?.slice(0,10)}: "${(p.text||'').slice(0,140)}" [תוקפנות: ${p.aggression||'?'}/5]\n`;
    });
    hasData = true;
  };

  const addTelegramPosts = (limit) => {
    if (!poolData.telegram.length) return;
    const recent = poolData.telegram.slice(0, limit);
    ctx += `\nפרסומים איראניים ב-Telegram (${poolData.telegram.length} סה"כ):\n`;
    recent.forEach(p => {
      ctx += `• ${p.account||p.channel} (${p.date?.slice(0,10)}): "${(p.text||'').slice(0,140)}"`;
      if (p.narratives?.length) ctx += ` [נרטיב: ${p.narratives.join(', ')}]`;
      ctx += '\n';
    });
    hasData = true;
  };

  if (currentActor.id === 'iran-leadership') {
    addIranPosts(20);
    addTelegramPosts(10);
  } else if (currentActor.id === 'trump') {
    addTrumpPosts(15);
    addIranPosts(8);
  } else if (currentActor.id === 'russia' || currentActor.id === 'china') {
    addIranPosts(10);
    addTrumpPosts(5);
  } else if (currentActor.id === 'netanyahu') {
    addIranPosts(12);
    addTrumpPosts(5);
  } else if (currentActor.id === 'analyst') {
    // Meta-analyst gets full picture
    addIranPosts(25);
    addTelegramPosts(15);
    addTrumpPosts(10);
  }

  return hasData ? ctx : '';
}

// ── Start ─────────────────────────────────────────────────────────────────────
init();

// Load scan time from pool_meta
fetch('pool_meta.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : null)
  .then(meta => {
    if (!meta) return;
    const iso = meta.last_any_update;
    if (!iso) return;
    const d = new Date(iso);
    const ds = `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
    const ts = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const el = document.getElementById('hdr-scan-time');
    if (el) el.textContent = `סריקה: ${ds} · ${ts}`;
  })
  .catch(() => {});
</script>
