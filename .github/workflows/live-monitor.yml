name: Live Monitor — every 30 min

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, 24/7
  workflow_dispatch: {}       # manual trigger

jobs:
  live-sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Live sweep — recent posts
        env:
          SOCIALDATA_KEY: ${{ secrets.SOCIALDATA_KEY }}
        run: python .github/scripts/collect-live.py

      - name: Commit new posts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_feed.json data/iran_posts.json data/pool_meta.json
          git diff --cached --quiet && echo "No new posts" || \
            git commit -m "live: sweep $(date -u +'%H:%M UTC')"
          git push

      - name: Deploy live_feed to gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          cp data/live_feed.json  live_feed.json  2>/dev/null || true
          cp data/iran_posts.json iran_posts.json 2>/dev/null || true
          cp data/pool_meta.json  pool_meta.json  2>/dev/null || true
          git add live_feed.json iran_posts.json pool_meta.json 2>/dev/null || true
          git diff --cached --quiet && echo "No gh-pages changes" || \
            git commit -m "live: deploy $(date -u +'%H:%M UTC')"
          git push origin gh-pages
          git checkout main
